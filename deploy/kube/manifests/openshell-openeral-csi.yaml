apiVersion: v1
kind: Namespace
metadata:
  name: openshell
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: csi.openeral.io
spec:
  attachRequired: false
  podInfoOnMount: true
  fsGroupPolicy: None
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: openeral
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: csi.openeral.io
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openeral-csi-controller
  namespace: openshell
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openeral-csi-controller
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openeral-csi-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openeral-csi-controller
subjects:
  - kind: ServiceAccount
    name: openeral-csi-controller
    namespace: openshell
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openeral-csi-controller
  namespace: openshell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openeral-csi-controller
  template:
    metadata:
      labels:
        app: openeral-csi-controller
    spec:
      serviceAccountName: openeral-csi-controller
      containers:
        - name: openeral-csi
          image: __OPENERAL_CSI_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/openeral-csi", "controller", "--endpoint", "/csi/csi.sock"]
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.2.0
          imagePullPolicy: IfNotPresent
          args:
            - "--csi-address=/csi/csi.sock"
            - "--leader-election=false"
            - "--extra-create-metadata=true"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
      volumes:
        - name: socket-dir
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openeral-csi-node
  namespace: openshell
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openeral-csi-node
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openeral-csi-node
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openeral-csi-node
subjects:
  - kind: ServiceAccount
    name: openeral-csi-node
    namespace: openshell
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: openeral-csi-node
  namespace: openshell
spec:
  selector:
    matchLabels:
      app: openeral-csi-node
  template:
    metadata:
      labels:
        app: openeral-csi-node
    spec:
      hostAliases:
        - ip: __HOST_GATEWAY_IP__
          hostnames:
            - host.docker.internal
            - host.openshell.internal
      serviceAccountName: openeral-csi-node
      containers:
        - name: openeral-csi
          image: __OPENERAL_CSI_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/openeral-csi", "node", "--endpoint", "/csi/csi.sock"]
          env:
            - name: OPENSHELL_ENDPOINT
              value: https://openshell.openshell.svc.cluster.local:8080
            - name: OPENSHELL_TLS_CA
              value: /etc/openshell-tls/client/ca.crt
            - name: OPENSHELL_TLS_CERT
              value: /etc/openshell-tls/client/tls.crt
            - name: OPENSHELL_TLS_KEY
              value: /etc/openshell-tls/client/tls.key
            - name: OPENSHELL_SSH_HANDSHAKE_SECRET
              valueFrom:
                secretKeyRef:
                  name: openshell-ssh-handshake
                  key: secret
          securityContext:
            privileged: true
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: openshell-client-tls
              mountPath: /etc/openshell-tls/client
              readOnly: true
            - name: fuse-device
              mountPath: /dev/fuse
        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0
          imagePullPolicy: IfNotPresent
          args:
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/csi.openeral.io/csi.sock"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
      volumes:
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi.openeral.io
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: fuse-device
          hostPath:
            path: /dev/fuse
            type: CharDevice
        - name: openshell-client-tls
          secret:
            secretName: openshell-client-tls
