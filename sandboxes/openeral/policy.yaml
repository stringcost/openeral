version: 1

# --- Sandbox setup configuration (queried once at startup) ---

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /opt
  read_write:
    - /sandbox
    - /sandbox/project
    - /tmp
    - /dev/null
    - /home/agent
    - /home/**
    - /mnt/**

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# --- Network policies (queried per-CONNECT request) ---
#
# Credential injection: stock OpenShell's SecretResolver automatically
# converts all provider credentials to placeholders and resolves them in
# the HTTP proxy for endpoints with protocol: rest + tls: terminate.
# No secret_injection field needed — it's built into the proxy.

network_policies:

  # --- Claude Code (Anthropic API) ---
  claude_code:
    name: claude-code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full
      - { host: statsig.anthropic.com, port: 443 }
      - { host: sentry.io, port: 443 }
      - { host: raw.githubusercontent.com, port: 443 }
      - { host: platform.claude.com, port: 443 }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/node }

  # --- Socket.dev package registry ---
  # When --provider socket is configured with SOCKET_TOKEN, npm traffic
  # routes to registry.socket.dev. The proxy resolves the placeholder
  # SOCKET_TOKEN in auth headers via protocol: rest + tls: terminate.
  # Restricted to read-only (GET) — npm install only reads the registry.
  # /usr/bin/node is required because npm is a shebang script — OpenShell's
  # policy engine matches the actual executable (/usr/bin/node), not the
  # script path (/usr/bin/npm) in argv[0].
  socket_packages:
    name: socket-packages
    endpoints:
      - host: registry.socket.dev
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/bin/npm }
      - { path: /usr/bin/node }

  # --- npm (default registry, when Socket.dev is not configured) ---
  # github.com + *.githubusercontent.com: native-module postinstall scripts
  # (e.g. sharp, used by openclaw) fetch pre-built binaries from GitHub releases.
  npm_registry:
    name: npm-registry
    endpoints:
      - { host: registry.npmjs.org, port: 443 }
      - { host: github.com, port: 443 }
      - { host: objects.githubusercontent.com, port: 443 }
      - { host: release-assets.githubusercontent.com, port: 443 }
      - { host: raw.githubusercontent.com, port: 443 }
      - { host: codeload.github.com, port: 443 }
    binaries:
      - { path: /usr/bin/npm }
      - { path: /usr/bin/node }
      - { path: /usr/bin/npx }

  # --- Git over HTTPS (read-only) ---
  github_ssh_over_https:
    name: github-ssh-over-https
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: "/**/info/refs*"
          - allow:
              method: POST
              path: "/**/git-upload-pack"
    binaries:
      - { path: /usr/bin/git }

  # --- GitHub REST API (read-only) ---
  github_rest_api:
    name: github-rest-api
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/gh }

  # --- PyPI ---
  pypi:
    name: pypi
    endpoints:
      - { host: pypi.org, port: 443 }
      - { host: files.pythonhosted.org, port: 443 }
      - { host: github.com, port: 443 }
      - { host: objects.githubusercontent.com, port: 443 }
      - { host: api.github.com, port: 443 }
      - { host: downloads.python.org, port: 443 }
    binaries:
      - { path: /sandbox/.venv/bin/python }
      - { path: /sandbox/.venv/bin/python3 }
      - { path: /sandbox/.venv/bin/pip }
      - { path: /app/.venv/bin/python }
      - { path: /app/.venv/bin/python3 }
      - { path: /app/.venv/bin/pip }
      - { path: /usr/local/bin/uv }
      - { path: "/sandbox/.uv/python/**" }

  # --- VS Code Remote ---
  vscode:
    name: vscode
    endpoints:
      - { host: update.code.visualstudio.com, port: 443 }
      - { host: az764295.vo.msecnd.net, port: 443 }
      - { host: vscode.download.prss.microsoft.com, port: 443 }
      - { host: marketplace.visualstudio.com, port: 443 }
      - { host: gallerycdn.vsassets.io, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: "/sandbox/.vscode-server/**" }
      - { path: "/sandbox/.vscode-remote-containers/**" }

  # --- Cursor ---
  cursor:
    name: cursor
    endpoints:
      - { host: cursor.blob.core.windows.net, port: 443 }
      - { host: api2.cursor.sh, port: 443 }
      - { host: repo.cursor.sh, port: 443 }
      - { host: download.cursor.sh, port: 443 }
      - { host: cursor.download.prss.microsoft.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: "/sandbox/.cursor-server/**" }

  # --- StringCost (optional cost tracking proxy for Anthropic API) ---
  # When ANTHROPIC_BASE_URL points at StringCost, Claude's API traffic routes
  # through StringCost for billing and usage metering.
  # The proxy resolves the ANTHROPIC_API_KEY placeholder in x-api-key headers.
  stringcost:
    name: stringcost
    endpoints:
      - host: proxy.stringcost.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full
      - host: app.stringcost.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/node }

  # --- External PostgreSQL (Supabase) via HTTP CONNECT tunnel ---
  # pg traffic cannot bypass OpenShell's HTTP proxy — the sandbox netns REJECTs
  # all raw TCP. openeral-js wraps its pg socket with an HTTP CONNECT handshake
  # (see src/db/http-connect-socket.ts) so the proxy sees `CONNECT host:port`
  # from /usr/bin/node, allows it per this policy, and then bidirectionally
  # relays bytes. pg negotiates its own end-to-end TLS with Supabase inside
  # the tunnel; the proxy never inspects payloads (no `protocol:` field).
  #
  # Host matching in OPA is literal, so each Supabase pooler hostname needs an
  # explicit entry. Supabase project regions are AWS regions, and current
  # Supavisor pooler hosts use aws-0 or aws-1 shards.
  postgres:
    name: postgres
    endpoints:
      # Supabase pooler — session mode (5432) and transaction mode (6543)
      - { host: aws-0-us-west-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-us-west-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-us-west-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-us-west-1.pooler.supabase.com, port: 6543 }
      - { host: aws-0-us-west-2.pooler.supabase.com, port: 5432 }
      - { host: aws-0-us-west-2.pooler.supabase.com, port: 6543 }
      - { host: aws-1-us-west-2.pooler.supabase.com, port: 5432 }
      - { host: aws-1-us-west-2.pooler.supabase.com, port: 6543 }
      - { host: aws-0-us-east-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-us-east-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-us-east-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-us-east-1.pooler.supabase.com, port: 6543 }
      - { host: aws-0-us-east-2.pooler.supabase.com, port: 5432 }
      - { host: aws-0-us-east-2.pooler.supabase.com, port: 6543 }
      - { host: aws-1-us-east-2.pooler.supabase.com, port: 5432 }
      - { host: aws-1-us-east-2.pooler.supabase.com, port: 6543 }
      - { host: aws-0-ca-central-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-ca-central-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-ca-central-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-ca-central-1.pooler.supabase.com, port: 6543 }
      - { host: aws-0-eu-west-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-eu-west-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-eu-west-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-eu-west-1.pooler.supabase.com, port: 6543 }
      - { host: aws-0-eu-west-2.pooler.supabase.com, port: 5432 }
      - { host: aws-0-eu-west-2.pooler.supabase.com, port: 6543 }
      - { host: aws-1-eu-west-2.pooler.supabase.com, port: 5432 }
      - { host: aws-1-eu-west-2.pooler.supabase.com, port: 6543 }
      - { host: aws-0-eu-west-3.pooler.supabase.com, port: 5432 }
      - { host: aws-0-eu-west-3.pooler.supabase.com, port: 6543 }
      - { host: aws-1-eu-west-3.pooler.supabase.com, port: 5432 }
      - { host: aws-1-eu-west-3.pooler.supabase.com, port: 6543 }
      - { host: aws-0-eu-central-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-eu-central-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-eu-central-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-eu-central-1.pooler.supabase.com, port: 6543 }
      - { host: aws-0-eu-central-2.pooler.supabase.com, port: 5432 }
      - { host: aws-0-eu-central-2.pooler.supabase.com, port: 6543 }
      - { host: aws-1-eu-central-2.pooler.supabase.com, port: 5432 }
      - { host: aws-1-eu-central-2.pooler.supabase.com, port: 6543 }
      - { host: aws-0-eu-north-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-eu-north-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-eu-north-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-eu-north-1.pooler.supabase.com, port: 6543 }
      - { host: aws-0-ap-south-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-ap-south-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-ap-south-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-ap-south-1.pooler.supabase.com, port: 6543 }
      - { host: aws-0-ap-southeast-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-ap-southeast-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-ap-southeast-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-ap-southeast-1.pooler.supabase.com, port: 6543 }
      - { host: aws-0-ap-northeast-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-ap-northeast-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-ap-northeast-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-ap-northeast-1.pooler.supabase.com, port: 6543 }
      - { host: aws-0-ap-northeast-2.pooler.supabase.com, port: 5432 }
      - { host: aws-0-ap-northeast-2.pooler.supabase.com, port: 6543 }
      - { host: aws-1-ap-northeast-2.pooler.supabase.com, port: 5432 }
      - { host: aws-1-ap-northeast-2.pooler.supabase.com, port: 6543 }
      - { host: aws-0-ap-southeast-2.pooler.supabase.com, port: 5432 }
      - { host: aws-0-ap-southeast-2.pooler.supabase.com, port: 6543 }
      - { host: aws-1-ap-southeast-2.pooler.supabase.com, port: 5432 }
      - { host: aws-1-ap-southeast-2.pooler.supabase.com, port: 6543 }
      - { host: aws-0-sa-east-1.pooler.supabase.com, port: 5432 }
      - { host: aws-0-sa-east-1.pooler.supabase.com, port: 6543 }
      - { host: aws-1-sa-east-1.pooler.supabase.com, port: 5432 }
      - { host: aws-1-sa-east-1.pooler.supabase.com, port: 6543 }
    binaries:
      - { path: /usr/bin/node }

  # --- OpenClaw install script ---
  # openclaw.ai serves the official install script. The npm install that
  # follows hits registry.npmjs.org (covered by npm_registry above).
  openclaw_install:
    name: openclaw-install
    endpoints:
      - { host: openclaw.ai, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }

  # --- OpenClaw (OpenAI API) ---
  # OpenClaw can target OpenAI models; credential injection via tls: terminate
  # resolves the OPENAI_API_KEY placeholder at egress.
  openclaw_openai:
    name: openclaw-openai
    endpoints:
      - host: api.openai.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full
    binaries:
      - { path: /usr/bin/node }

  # --- Copilot ---
  copilot:
    name: copilot
    endpoints:
    - { host: github.com, port: 443 }
    - { host: api.github.com, port: 443 }
    - { host: api.githubcopilot.com, port: 443 }
    - { host: api.enterprise.githubcopilot.com, port: 443 }
    - { host: release-assets.githubusercontent.com, port: 443 }
    - { host: copilot-proxy.githubusercontent.com, port: 443 }
    - { host: default.exp-tas.com, port: 443 }
    binaries:
    - { path: /usr/lib/node_modules/@github/copilot/node_modules/@github/**/copilot }
