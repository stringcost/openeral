name: RPM Package

on:
  workflow_call:
    inputs:
      checkout-ref:
        required: true
        type: string
      rpm-version:
        required: false
        type: string
        default: ""
      rpm-release:
        required: false
        type: string
        default: ""
      cargo-version:
        required: false
        type: string
        default: ""

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-rpm-linux:
    name: Build RPM Package (Linux ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: linux-amd64-cpu8
          - arch: aarch64
            runner: linux-arm64-cpu8
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    container:
      image: fedora:latest
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            packit rpm-build \
            rust cargo gcc gcc-c++ make cmake pkg-config \
            clang-devel z3-devel systemd-rpm-macros \
            pandoc python3-devel git-core \
            cargo-rpm-macros

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref }}
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Build RPMs via Packit
        env:
          OPENSHELL_RPM_VERSION: ${{ inputs['rpm-version'] }}
          OPENSHELL_RPM_RELEASE: ${{ inputs['rpm-release'] }}
          OPENSHELL_CARGO_VERSION: ${{ inputs['cargo-version'] }}
        run: packit build locally

      - name: Collect RPM artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts
          mapfile -t rpms < <(find "$GITHUB_WORKSPACE" -maxdepth 3 -type f -name '*.rpm' ! -name '*.src.rpm' | sort)
          if [ "${#rpms[@]}" -eq 0 ]; then
            echo "::error::No RPM artifacts found under $GITHUB_WORKSPACE"
            find "$GITHUB_WORKSPACE" -maxdepth 3 -type f | sort
            exit 1
          fi
          cp "${rpms[@]}" artifacts/
          echo "=== Built RPMs ==="
          ls -lah artifacts/

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rpm-linux-${{ matrix.arch }}
          path: artifacts/*.rpm
          retention-days: 5
