# Merge after values.yaml when cert-manager CRDs are installed, e.g.:
#   helm install ... -f values.yaml -f values-cert-manager.yaml
# Or add this file to skaffold manifests.helm.releases[].valuesFiles.
server:
  disableTls: false

pkiInitJob:
  enabled: false

certManager:
  enabled: true
