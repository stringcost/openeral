{{- if .Values.sshHandshake.hook.enabled }}
{{- $name := .Values.server.sshHandshakeSecretName }}
{{- $ns := .Release.Namespace }}
{{- $existing := lookup "v1" "Secret" $ns $name }}
{{- if not $existing }}
{{- $hex := .Values.sshHandshake.value }}
{{- if not $hex }}
{{- $hex = printf "%s%s" (uuidv4 | replace "-" "") (uuidv4 | replace "-" "") }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
type: Opaque
stringData:
  secret: {{ $hex | quote }}
{{- end }}
{{- end }}
