# Merge with values.yaml for Skaffold-driven local image builds (see skaffold.yaml).
server:
  sandboxImagePullPolicy: IfNotPresent
  # Comment out to enforce mTLS (uses PKI secrets generated by pkiInitJob).
  disableTls: true

supervisor:
  image:
    pullPolicy: IfNotPresent
