id: codex
display_name: Codex
description: Codex CLI using OpenAI-compatible API credentials
category: agent
inference_capable: true
credentials:
  - name: api_key
    description: OpenAI API key
    env_vars: [OPENAI_API_KEY]
    required: true
    auth_style: bearer
    header_name: authorization
endpoints:
  - host: api.openai.com
    port: 443
    protocol: rest
    access: read-write
    enforcement: enforce
binaries: [/usr/bin/codex, /usr/local/bin/codex]
