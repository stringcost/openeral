name: Publish images

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.claude/skills/**'
      - '.dockerignore'
      - 'sandboxes/openeral/**'
      - 'vendor/openshell/**'
      - '.github/scripts/smoke_openshell.sh'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPO_BASE: ghcr.io/${{ github.repository_owner }}/openeral
  CANDIDATE_TAG: sha-${{ github.sha }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pgmount
          POSTGRES_PASSWORD: pgmount
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgmount"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: clippy

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-1.95
          cache-workspaces: |
            . -> target
            vendor/openshell -> vendor/openshell/target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse3-dev fuse3 pkg-config libpq-dev postgresql-client

      - name: Build and clippy openeral
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: |
          cargo clippy --all-targets
          cargo test -p openeral-core --no-run

      - name: Build patched OpenShell crates
        run: |
          cargo test --manifest-path vendor/openshell/Cargo.toml \
            -p openshell-driver-docker \
            -p openshell-policy \
            -p openshell-sandbox \
            --no-run

      - name: Rust integration tests
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: cargo test -p openeral-core

      - name: FUSE mount integration tests
        env:
          PGPASSWORD: pgmount
          DB_CONN: "host=localhost user=pgmount password=pgmount dbname=testdb"
          DB_HOST: localhost
          OPENERAL_TEST_MNT: /mnt/pgtest
        run: |
          sudo mkdir -p /mnt/pgtest
          sudo chmod 777 /mnt/pgtest
          sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf || true
          bash tests/test_fuse_mount.sh

  build-smoke-and-publish:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client curl

      - name: Install upstream OpenShell CLI
        run: |
          set -euo pipefail
          export OPENSHELL_INSTALL_DIR="${RUNNER_TEMP}/openshell/bin"
          mkdir -p "$OPENSHELL_INSTALL_DIR"
          curl -LsSf https://raw.githubusercontent.com/NVIDIA/OpenShell/main/install.sh | sh
          echo "$OPENSHELL_INSTALL_DIR" >> "$GITHUB_PATH"
          "$OPENSHELL_INSTALL_DIR/openshell" --version

      - name: Build gateway image locally
        uses: docker/build-push-action@v6
        with:
          context: vendor/openshell
          file: vendor/openshell/deploy/docker/Dockerfile.images
          target: gateway
          load: true
          tags: ${{ env.IMAGE_REPO_BASE }}/gateway:${{ env.CANDIDATE_TAG }}
          cache-from: type=gha,scope=publish-openshell-gateway
          cache-to: type=gha,mode=max,scope=publish-openshell-gateway
          build-args: |
            BUILD_FROM_SOURCE=1
            OPENSHELL_IMAGE_TAG=${{ env.CANDIDATE_TAG }}

      - name: Build supervisor image locally
        uses: docker/build-push-action@v6
        with:
          context: vendor/openshell
          file: vendor/openshell/deploy/docker/Dockerfile.images
          target: supervisor
          load: true
          tags: ${{ env.IMAGE_REPO_BASE }}/supervisor:${{ env.CANDIDATE_TAG }}
          cache-from: type=gha,scope=publish-openshell-supervisor
          cache-to: type=gha,mode=max,scope=publish-openshell-supervisor
          build-args: |
            BUILD_FROM_SOURCE=1
            OPENSHELL_IMAGE_TAG=${{ env.CANDIDATE_TAG }}

      - name: Build sandbox image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandboxes/openeral/Dockerfile
          load: true
          tags: ${{ env.IMAGE_REPO_BASE }}/sandbox:${{ env.CANDIDATE_TAG }}
          cache-from: type=gha,scope=publish-sandbox
          cache-to: type=gha,mode=max,scope=publish-sandbox

      - name: Run OpenShell Docker-driver smoke test
        env:
          OPENERAL_GATEWAY_IMAGE: ${{ env.IMAGE_REPO_BASE }}/gateway:${{ env.CANDIDATE_TAG }}
          OPENERAL_SUPERVISOR_IMAGE: ${{ env.IMAGE_REPO_BASE }}/supervisor:${{ env.CANDIDATE_TAG }}
          OPENERAL_SANDBOX_IMAGE: ${{ env.IMAGE_REPO_BASE }}/sandbox:${{ env.CANDIDATE_TAG }}
        run: bash .github/scripts/smoke_openshell.sh

      - name: Log in to GHCR
        if: ${{ env.ACT != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push candidate images
        if: ${{ env.ACT != 'true' }}
        run: |
          set -euo pipefail
          docker push "${IMAGE_REPO_BASE}/gateway:${CANDIDATE_TAG}"
          docker push "${IMAGE_REPO_BASE}/supervisor:${CANDIDATE_TAG}"
          docker push "${IMAGE_REPO_BASE}/sandbox:${CANDIDATE_TAG}"

  promote:
    needs: [build-smoke-and-publish]
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'nektos/act' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote candidate tags
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          set -euo pipefail

          promote() {
            local source="$1"
            local target="$2"
            docker buildx imagetools create -t "$target" "$source"
          }

          gateway_source="${IMAGE_REPO_BASE}/gateway:${CANDIDATE_TAG}"
          supervisor_source="${IMAGE_REPO_BASE}/supervisor:${CANDIDATE_TAG}"
          sandbox_source="${IMAGE_REPO_BASE}/sandbox:${CANDIDATE_TAG}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            promote "$gateway_source" "${IMAGE_REPO_BASE}/gateway:latest"
            promote "$supervisor_source" "${IMAGE_REPO_BASE}/supervisor:latest"
            promote "$sandbox_source" "${IMAGE_REPO_BASE}/sandbox:latest"
          fi

          if [ -n "${RELEASE_TAG}" ]; then
            promote "$gateway_source" "${IMAGE_REPO_BASE}/gateway:${RELEASE_TAG}"
            promote "$supervisor_source" "${IMAGE_REPO_BASE}/supervisor:${RELEASE_TAG}"
            promote "$sandbox_source" "${IMAGE_REPO_BASE}/sandbox:${RELEASE_TAG}"
          fi
