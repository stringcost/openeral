name: Publish sandbox image

on:
  push:
    branches: [just-bash, feat/persistence]
    paths:
      - 'openeral-js/**'
      - '.claude/skills/**'
      - '.dockerignore'
      - 'sandboxes/openeral/**'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPO_BASE: ghcr.io/${{ github.repository_owner }}/openeral

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openeral
          POSTGRES_PASSWORD: openeral
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openeral"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: openeral-js
        run: pnpm install

      - name: Typecheck
        working-directory: openeral-js
        run: pnpm typecheck

      - name: Lint
        working-directory: openeral-js
        run: pnpm lint

      - name: Unit tests
        working-directory: openeral-js
        run: pnpm test

      - name: Build
        working-directory: openeral-js
        run: pnpm build

      - name: Integration tests
        working-directory: openeral-js
        env:
          DATABASE_URL: postgresql://openeral:openeral@localhost:5432/testdb
        run: node test-integration.mjs

      - name: Validate setup.sh syntax (claude and openclaw paths)
        run: |
          bash -n sandboxes/openeral/setup.sh
          grep -q 'OPENERAL_AGENT' sandboxes/openeral/setup.sh
          grep -q 'openclaw' sandboxes/openeral/setup.sh

  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandboxes/openeral/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO_BASE }}/sandbox:just-bash
            ${{ env.IMAGE_REPO_BASE }}/sandbox:just-bash-sha-${{ github.sha }}
          cache-from: type=gha,scope=sandbox-just-bash
          cache-to: type=gha,mode=max,scope=sandbox-just-bash
