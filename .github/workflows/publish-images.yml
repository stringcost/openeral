name: Publish images

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.claude/skills/**'
      - '.dockerignore'
      - 'sandboxes/openeral/**'
      - 'vendor/openshell/**'
      - '.github/scripts/smoke_openshell.sh'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPO_BASE: ghcr.io/${{ github.repository_owner }}/openeral
  CANDIDATE_TAG: sha-${{ github.sha }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pgmount
          POSTGRES_PASSWORD: pgmount
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgmount"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: clippy,rustfmt

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-1.95
          cache-workspaces: |
            . -> target
            vendor/openshell -> vendor/openshell/target

      - name: Install system dependencies
        run: |
          set -euo pipefail

          retry() {
            local attempt=1
            local delay=5

            until "$@"; do
              if [ "$attempt" -ge 5 ]; then
                return 1
              fi

              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          configure_apt_for_act() {
            if [ "${ACT:-}" != "true" ]; then
              return 0
            fi

            local mirror="http://mirrors.edge.kernel.org/ubuntu"
            sudo find /etc/apt/sources.list.d -type f ! -name 'ubuntu.sources' -delete 2>/dev/null || true
            sudo sed -i \
              -e "s|http://archive.ubuntu.com/ubuntu|$mirror|g" \
              -e "s|http://security.ubuntu.com/ubuntu|$mirror|g" \
              -e "s|https://archive.ubuntu.com/ubuntu|$mirror|g" \
              -e "s|https://security.ubuntu.com/ubuntu|$mirror|g" \
              /etc/apt/sources.list /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list 2>/dev/null || true
          }

          apt_index_ready() {
            sudo rm -rf /var/lib/apt/lists/*
            sudo apt-get update \
              -o Acquire::Retries=2 \
              -o Acquire::http::Timeout=30 \
              -o Acquire::https::Timeout=30 || return 1

            for package in "$@"; do
              apt-cache show "$package" >/dev/null 2>&1 || return 1
            done
          }

          configure_apt_for_act
          retry apt_index_ready libfuse3-dev fuse3 pkg-config libpq-dev postgresql-client shellcheck
          retry sudo apt-get install -y --no-install-recommends libfuse3-dev fuse3 pkg-config libpq-dev postgresql-client shellcheck

      - name: Formatting and shell lint
        run: |
          cargo fmt --check
          cargo fmt --manifest-path vendor/openshell/Cargo.toml --all --check
          shellcheck \
            tests/test_live_supabase_env.sh \
            tests/test_live_secret_injection.sh \
            tests/test_fuse_mount.sh \
            deploy/docker/openeral-cluster-entrypoint.sh
          bash -n tests/test_live_supabase_env.sh
          bash -n tests/test_live_secret_injection.sh
          bash -n tests/test_fuse_mount.sh
          sh -n deploy/docker/openeral-cluster-entrypoint.sh

      - name: Build and clippy openeral
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo test -p openeral-core -p openeral-csi --no-run

      - name: Build patched OpenShell crates
        run: |
          cargo clippy --manifest-path vendor/openshell/Cargo.toml \
            -p openshell-driver-docker \
            -p openshell-driver-kubernetes \
            -p openshell-policy \
            -p openshell-sandbox \
            -p openshell-bootstrap \
            --all-targets -- \
            -D warnings \
            -A clippy::option_if_let_else \
            -A clippy::map_unwrap_or \
            -A clippy::too_many_arguments \
            -A clippy::single_match_else \
            -A clippy::redundant_pub_crate \
            -A clippy::unnecessary_wraps \
            -A clippy::redundant_clone
          cargo test --manifest-path vendor/openshell/Cargo.toml \
            -p openshell-driver-docker \
            -p openshell-driver-kubernetes \
            -p openshell-policy \
            -p openshell-sandbox \
            -p openshell-bootstrap \
            --no-run

      - name: Rust integration tests
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: |
          cargo test -p openeral-core
          cargo test -p openeral-csi

      - name: FUSE mount integration tests
        env:
          PGPASSWORD: pgmount
          DB_CONN: "host=localhost user=pgmount password=pgmount dbname=testdb"
          DB_HOST: localhost
          OPENERAL_TEST_MNT: /mnt/pgtest
        run: |
          sudo mkdir -p /mnt/pgtest
          sudo chmod 777 /mnt/pgtest
          sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf || true
          bash tests/test_fuse_mount.sh

  build-smoke-and-publish:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install smoke dependencies
        run: |
          set -euo pipefail

          retry() {
            local attempt=1
            local delay=5

            until "$@"; do
              if [ "$attempt" -ge 5 ]; then
                return 1
              fi

              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          configure_apt_for_act() {
            if [ "${ACT:-}" != "true" ]; then
              return 0
            fi

            local mirror="http://mirrors.edge.kernel.org/ubuntu"
            sudo find /etc/apt/sources.list.d -type f ! -name 'ubuntu.sources' -delete 2>/dev/null || true
            sudo sed -i \
              -e "s|http://archive.ubuntu.com/ubuntu|$mirror|g" \
              -e "s|http://security.ubuntu.com/ubuntu|$mirror|g" \
              -e "s|https://archive.ubuntu.com/ubuntu|$mirror|g" \
              -e "s|https://security.ubuntu.com/ubuntu|$mirror|g" \
              /etc/apt/sources.list /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list 2>/dev/null || true
          }

          apt_index_ready() {
            sudo rm -rf /var/lib/apt/lists/*
            sudo apt-get update \
              -o Acquire::Retries=2 \
              -o Acquire::http::Timeout=30 \
              -o Acquire::https::Timeout=30 || return 1

            for package in "$@"; do
              apt-cache show "$package" >/dev/null 2>&1 || return 1
            done
          }

          configure_apt_for_act
          retry apt_index_ready postgresql-client curl clang libclang-dev libz3-dev
          retry sudo apt-get install -y --no-install-recommends postgresql-client curl clang libclang-dev libz3-dev

      - name: Install Rust for matching OpenShell CLI
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"

      - name: Cache matching OpenShell CLI build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: smoke-openshell-cli-1.95
          cache-workspaces: |
            vendor/openshell -> vendor/openshell/target

      - name: Build matching OpenShell CLI
        run: |
          set -euo pipefail
          cargo build --manifest-path vendor/openshell/Cargo.toml --release -p openshell-cli
          echo "${PWD}/vendor/openshell/target/release" >> "$GITHUB_PATH"
          "${PWD}/vendor/openshell/target/release/openshell" --version

      - name: Build gateway image locally
        uses: docker/build-push-action@v6
        with:
          context: vendor/openshell
          file: vendor/openshell/deploy/docker/Dockerfile.images
          target: gateway
          load: true
          tags: ${{ env.IMAGE_REPO_BASE }}/gateway:${{ env.CANDIDATE_TAG }}
          cache-from: type=gha,scope=publish-openshell-gateway
          cache-to: type=gha,mode=max,scope=publish-openshell-gateway
          build-args: |
            BUILD_FROM_SOURCE=1
            OPENSHELL_IMAGE_TAG=${{ env.CANDIDATE_TAG }}
            UBUNTU_APT_MIRROR=http://mirrors.edge.kernel.org/ubuntu

      - name: Build supervisor image locally
        uses: docker/build-push-action@v6
        with:
          context: vendor/openshell
          file: vendor/openshell/deploy/docker/Dockerfile.images
          target: supervisor
          load: true
          tags: ${{ env.IMAGE_REPO_BASE }}/supervisor:${{ env.CANDIDATE_TAG }}
          cache-from: type=gha,scope=publish-openshell-supervisor
          cache-to: type=gha,mode=max,scope=publish-openshell-supervisor
          build-args: |
            BUILD_FROM_SOURCE=1
            OPENSHELL_IMAGE_TAG=${{ env.CANDIDATE_TAG }}
            UBUNTU_APT_MIRROR=http://mirrors.edge.kernel.org/ubuntu

      - name: Build sandbox image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandboxes/openeral/Dockerfile
          load: true
          tags: ${{ env.IMAGE_REPO_BASE }}/sandbox:${{ env.CANDIDATE_TAG }}
          cache-from: type=gha,scope=publish-sandbox
          cache-to: type=gha,mode=max,scope=publish-sandbox
          build-args: |
            UBUNTU_APT_MIRROR=http://mirrors.edge.kernel.org/ubuntu

      - name: Run OpenShell Docker-driver smoke test
        env:
          OPENERAL_GATEWAY_IMAGE: ${{ env.IMAGE_REPO_BASE }}/gateway:${{ env.CANDIDATE_TAG }}
          OPENERAL_SUPERVISOR_IMAGE: ${{ env.IMAGE_REPO_BASE }}/supervisor:${{ env.CANDIDATE_TAG }}
          OPENERAL_SANDBOX_IMAGE: ${{ env.IMAGE_REPO_BASE }}/sandbox:${{ env.CANDIDATE_TAG }}
        run: bash .github/scripts/smoke_openshell.sh

      - name: Log in to GHCR
        if: ${{ env.ACT != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push candidate images
        if: ${{ env.ACT != 'true' }}
        run: |
          set -euo pipefail
          docker push "${IMAGE_REPO_BASE}/gateway:${CANDIDATE_TAG}"
          docker push "${IMAGE_REPO_BASE}/supervisor:${CANDIDATE_TAG}"
          docker push "${IMAGE_REPO_BASE}/sandbox:${CANDIDATE_TAG}"

  promote:
    needs: [build-smoke-and-publish]
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'nektos/act' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote candidate tags
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          set -euo pipefail

          promote() {
            local source="$1"
            local target="$2"
            docker buildx imagetools create -t "$target" "$source"
          }

          gateway_source="${IMAGE_REPO_BASE}/gateway:${CANDIDATE_TAG}"
          supervisor_source="${IMAGE_REPO_BASE}/supervisor:${CANDIDATE_TAG}"
          sandbox_source="${IMAGE_REPO_BASE}/sandbox:${CANDIDATE_TAG}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            promote "$gateway_source" "${IMAGE_REPO_BASE}/gateway:latest"
            promote "$supervisor_source" "${IMAGE_REPO_BASE}/supervisor:latest"
            promote "$sandbox_source" "${IMAGE_REPO_BASE}/sandbox:latest"
          fi

          if [ -n "${RELEASE_TAG}" ]; then
            promote "$gateway_source" "${IMAGE_REPO_BASE}/gateway:${RELEASE_TAG}"
            promote "$supervisor_source" "${IMAGE_REPO_BASE}/supervisor:${RELEASE_TAG}"
            promote "$sandbox_source" "${IMAGE_REPO_BASE}/sandbox:${RELEASE_TAG}"
          fi
