name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pgmount
          POSTGRES_PASSWORD: pgmount
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgmount"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy,rustfmt

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-1.85
          cache-workspaces: |
            . -> target

      - name: Install system dependencies
        run: |
          set -euo pipefail

          retry() {
            local attempt=1
            local delay=5

            until "$@"; do
              if [ "$attempt" -ge 5 ]; then
                return 1
              fi

              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          configure_apt_for_act() {
            if [ "${ACT:-}" != "true" ]; then
              return 0
            fi

            local mirror="http://mirrors.edge.kernel.org/ubuntu"
            sudo find /etc/apt/sources.list.d -type f ! -name 'ubuntu.sources' -delete 2>/dev/null || true
            sudo sed -i \
              -e "s|http://archive.ubuntu.com/ubuntu|$mirror|g" \
              -e "s|http://security.ubuntu.com/ubuntu|$mirror|g" \
              -e "s|https://archive.ubuntu.com/ubuntu|$mirror|g" \
              -e "s|https://security.ubuntu.com/ubuntu|$mirror|g" \
              /etc/apt/sources.list /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list 2>/dev/null || true
          }

          apt_index_ready() {
            sudo rm -rf /var/lib/apt/lists/*
            sudo apt-get update \
              -o Acquire::Retries=2 \
              -o Acquire::http::Timeout=30 \
              -o Acquire::https::Timeout=30 || return 1

            for package in "$@"; do
              apt-cache show "$package" >/dev/null 2>&1 || return 1
            done
          }

          configure_apt_for_act
          retry apt_index_ready libfuse3-dev fuse3 pkg-config libpq-dev postgresql-client shellcheck
          retry sudo apt-get install -y --no-install-recommends libfuse3-dev fuse3 pkg-config libpq-dev postgresql-client shellcheck

      - name: Formatting and shell lint
        run: |
          cargo fmt --check
          cargo fmt --manifest-path vendor/openshell/Cargo.toml --all --check
          shellcheck \
            tests/test_live_supabase_env.sh \
            tests/test_live_secret_injection.sh \
            tests/test_fuse_mount.sh \
            deploy/docker/openeral-cluster-entrypoint.sh
          bash -n tests/test_live_supabase_env.sh
          bash -n tests/test_live_secret_injection.sh
          bash -n tests/test_fuse_mount.sh
          sh -n deploy/docker/openeral-cluster-entrypoint.sh

      - name: Build and clippy
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo test -p openeral-core -p openeral-csi --no-run
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"

      - name: Patched OpenShell checks
        run: |
          cargo clippy --manifest-path vendor/openshell/Cargo.toml \
            -p openshell-driver-docker \
            -p openshell-driver-kubernetes \
            -p openshell-policy \
            -p openshell-sandbox \
            -p openshell-bootstrap \
            --all-targets -- \
            -D warnings \
            -A clippy::option_if_let_else \
            -A clippy::map_unwrap_or \
            -A clippy::too_many_arguments \
            -A clippy::single_match_else \
            -A clippy::redundant_pub_crate \
            -A clippy::unnecessary_wraps \
            -A clippy::redundant_clone
          cargo test --manifest-path vendor/openshell/Cargo.toml \
            -p openshell-driver-docker \
            -p openshell-driver-kubernetes \
            -p openshell-policy \
            -p openshell-sandbox \
            -p openshell-bootstrap \
            --lib

      - name: Rust integration tests
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: |
          cargo test -p openeral-core
          cargo test -p openeral-csi

      - name: FUSE mount integration tests
        env:
          PGPASSWORD: pgmount
          DB_CONN: "host=localhost user=pgmount password=pgmount dbname=testdb"
          DB_HOST: localhost
          OPENERAL_TEST_MNT: /mnt/pgtest
        run: |
          sudo mkdir -p /mnt/pgtest
          sudo chmod 777 /mnt/pgtest
          sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf || true
          bash tests/test_fuse_mount.sh
