name: CI

on:
  pull_request:
    branches: [just-bash]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openeral
          POSTGRES_PASSWORD: openeral
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openeral"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: openeral-js
        run: pnpm install

      - name: Typecheck
        working-directory: openeral-js
        run: pnpm typecheck

      - name: Lint
        working-directory: openeral-js
        run: pnpm lint

      - name: Unit tests
        working-directory: openeral-js
        run: pnpm test

      - name: Build
        working-directory: openeral-js
        run: pnpm build

      - name: Integration tests
        working-directory: openeral-js
        env:
          DATABASE_URL: postgresql://openeral:openeral@localhost:5432/testdb
        run: node test-integration.mjs

      - name: Validate setup.sh syntax (claude and openclaw paths)
        run: |
          bash -n sandboxes/openeral/setup.sh
          grep -q 'OPENERAL_AGENT' sandboxes/openeral/setup.sh
          grep -q 'openclaw' sandboxes/openeral/setup.sh
